<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Thank You | Guna Teddi</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://api.fontshare.com/v2/css?f[]=satoshi@300,400,500,700,900&f[]=cabinet-grotesk@500,700,800&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: 'Satoshi', system-ui, sans-serif;
      background: #f7f6f2;
      color: #28251d;
      padding: 1.5rem;
    }
    
    .thankyou-card {
      max-width: 560px;
      width: 100%;
      padding: 3rem 2.5rem;
      background: #f9f8f5;
      border-radius: 2rem;
      border: 1px solid #d4d1ca;
      box-shadow: 0 18px 50px rgb(0 0 0 / 0.12);
      text-align: center;
    }
    
    .icon {
      font-size: 4rem;
      margin-bottom: 1rem;
      display: block;
    }
    
    h1 {
      font-family: 'Cabinet Grotesk', 'Satoshi', system-ui, sans-serif;
      font-size: 2rem;
      margin-bottom: 0.75rem;
      letter-spacing: -0.03em;
    }
    
    p {
      color: #66645e;
      margin-bottom: 0.5rem;
      line-height: 1.7;
    }
    
    .btn {
      display: inline-block;
      margin-top: 1.5rem;
      padding: 0.9rem 2rem;
      border-radius: 9999px;
      background: #01696f;
      color: white;
      font-weight: 700;
      text-decoration: none;
      transition: 0.2s ease;
      border: none;
      cursor: pointer;
    }
    
    .btn:hover {
      background: #0c4e54;
      transform: translateY(-1px);
    }
    
    .highlight {
      color: #01696f;
      font-weight: 700;
    }
    
    .sub-text {
      font-size: 0.9rem;
      color: #a9a7a1;
      margin-top: 1rem;
    }
  </style>
</head>
<body>
  <div class="thankyou-card">
    <span class="icon">✅</span>
    <h1>Thank You!</h1>
    <p>Your message has been sent successfully.</p>
    <p>I'll get back to you as soon as possible.</p>
    <p style="margin-top: 0.5rem; font-size: 0.95rem;">
      — <span class="highlight">Guna Teddi</span>
    </p>
    <a href="index.html" class="btn">← Back to Home</a>
    <p class="sub-text">You'll receive a response within 24-48 hours.</p>
  </div>
</body>
</html>
